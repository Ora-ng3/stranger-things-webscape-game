<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Webscape Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="view-container">
        <img id="main-bg" src="assets/static/Main.png" alt="Main View" />
        <!-- We use two video players for double buffering -->
        <video id="player-1" class="anim-player" playsinline muted></video>
        <video id="player-2" class="anim-player" playsinline muted></video>
        
        <svg id="hotspot-layer"></svg>

        <div id="ui-layer">
            <div class="top-bar">
                <button id="btn-back" class="hidden">Back</button>
            </div>
            <div class="bottom-bar" id="options-container">
                <!-- Navigation buttons will be injected here -->
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
